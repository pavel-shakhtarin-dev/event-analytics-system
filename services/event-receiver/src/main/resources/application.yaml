spring:
  application:
    name: event-receiver

  profiles:
    active: default

  datasource:
    url: jdbc:postgresql://localhost:5439/event_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: event

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/event-platform

outbox:
  partition:
    cron: "0 0 * * * *"