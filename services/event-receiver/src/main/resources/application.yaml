spring:
  application:
    name: event-receiver

  profiles:
    active: default

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5439}/event_db?currentSchema=event
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      default_schema: event

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: event

springdoc:
  swagger-ui:
    path: /swagger-ui.html    # Путь к UI
    operations-sorter: method # Сортировка методов (GET, POST и т.д.)
  api-docs:
    path: /v3/api-docs        # Путь к JSON-документации

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

  prometheus:
    metrics:
      export:
        enabled: true

app:
  outbox:
    cleanup:
      enabled: true
      cron: "0 0 0 * * *"
      retention: PT24H
      batch-size: 1000
      shed-lock-at-most: "10m"
      shed-lock-at-least: "1m"